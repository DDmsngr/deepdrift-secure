name: DDchat
description: DDChat - Secure End-to-End Encrypted Messenger (Enhanced)
publish_to: 'none'
version: 3.5.0+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  gal: ^2.3.0
  dio: ^5.4.0

  # State management
  provider: ^6.1.2

  # База данных
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Безопасное хранилище (Keychain / Keystore) — для auth_token
  flutter_secure_storage: ^9.0.0

  # Кеширование изображений
  cached_network_image: ^3.3.1

  # Криптография (Web-safe)
  cryptography: ^2.5.0
  crypto: ^3.0.3

  # Сеть
  web_socket_channel: ^2.4.0

  # Push уведомления
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  flutter_local_notifications: ^17.2.4

  # Утилиты
  uuid: ^4.2.2
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0

  # UI
  google_fonts: ^6.1.0

  # Медиа
  image_picker: ^1.0.7
  record: ^6.0.0
  audioplayers: ^5.2.1
  camera: ^0.11.0
  video_player: ^2.8.2

  # WebRTC (голосовые и видео вызовы)
  flutter_webrtc: ^0.12.4

  # Разрешения
  permission_handler: ^11.2.0

  # Файлы
  file_picker: ^8.0.0
  path_provider: ^2.1.0

  # Биометрическая аутентификация
  local_auth: ^2.3.0

  # Запрет скриншотов (FLAG_SECURE на Android, iOS secure)

  # Шэринг (сохранить файл / отправить на почту)
  share_plus: ^10.0.0

  # Deep links (deepdrift://channel/ch_xxx)
  app_links: ^6.3.3

  # URL launcher для ссылок в сообщениях
  url_launcher: ^6.3.0

  # Рендеринг Markdown (ToS / Privacy Policy)
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
