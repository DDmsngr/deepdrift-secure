name: DDchat
description: DDChat - Secure End-to-End Encrypted Messenger (Enhanced)
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  gal: ^2.3.0
  dio: ^5.4.0
  
  # База данных
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Криптография (Web-safe)
  cryptography: ^2.5.0
  crypto: ^3.0.3

  # Сеть
  web_socket_channel: ^2.4.0

  # Push уведомления - ОБНОВЛЕНО для SDK 35
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  flutter_local_notifications: ^17.2.4

  # Утилиты
  uuid: ^4.2.2
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0

  # UI
  google_fonts: ^6.1.0

  # Медиа
  image_picker: ^1.0.7
  record: ^6.0.0
  audioplayers: ^5.2.1
  
  # Разрешения
  permission_handler: ^11.2.0
  
  # Файлы
  file_picker: ^8.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^4.0.0

flutter:
  uses-material-design: true
