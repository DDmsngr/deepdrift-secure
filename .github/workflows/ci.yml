name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Unit tests
        run: flutter test

      - name: README/pubspec version sync
        run: python3 scripts/check_readme_version.py

      - name: Dependency audit (pub outdated)
        run: flutter pub outdated --json > pub_outdated.json || true

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: pub-outdated-report
          path: pub_outdated.json
